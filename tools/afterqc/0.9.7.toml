[tool]
id = "afterqc"
version = "0.9.7"
description = "Automatic Filtering, Trimming, Error Removing and Quality Control for fastq data. AfterQC can simply go through all fastq files in a folder and then output three folders: good, bad and QC folders, which contains good reads, bad reads and the QC results of each fastq file/pair. Currently it supports processing data from HiSeq 2000/2500/3000/4000, Nextseq 500/550, MiniSeq...and other Illumina 1.8 or newer formats."
homepage = "https://github.com/OpenGene/AfterQC"
license = "MIT"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/afterqc:0.9.7--py27_0"
digest = "sha256:d4b9539a3e0080416580c7f155dc15a0a3efc87f55fda00923e61a232234ea3b"

[tool.hardware]
# TODO: update if this tool has known hardware requirements
